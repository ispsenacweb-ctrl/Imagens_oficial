<html lang="pt-br"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato - Cafeteria Grão Dourado</title>

<link rel="stylesheet" href="./Contato - Cafeteria Grão Dourado_files/all.min.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background-color: #2c1b0e;
    color: #92580c;
}
h1{
     color: #d4af37;
    margin-bottom: 15px;
}
h2{
     color: #d4af37;
    margin-bottom: 15px;
}
p{
    color: #d4af37;
    margin-bottom: 15px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

header {
    text-align: center;
}

nav {
    text-align: center;
    margin: 20px 0;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #6f4e37;
    font-weight: bold;
}

.form-contato {
    background: #ffffff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.campo {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
}

.campo label {
    font-weight: bold;
    color: #6f4e37;
    margin-bottom: 8px;
}

.campo input, .campo textarea {
    padding: 12px;
    border: 1px solid #e9b36c;
    border-radius: 6px;
}

.btn-whatsapp {
    background-color: #6b390be3;
    color: rgb(224, 167, 101);
    border: none;
    padding: 15px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}

.btn-whatsapp:hover {
    background-color: #5a2d02;
}

.info-contato {
    margin-top: 20px;
    text-align: center;
}

footer {
    text-align: center;
    margin-top: 30px;
}
</style>

</head>

<body>

<div class="container">

<header>
    <h1>Cafeteria Grão Dourado</h1>
</header>

<h2>Fale Conosco</h2>

<form class="form-contato">

```
<div class="campo">
    <label>Nome:</label>
    <input type="text" id="nome" required="">
</div>

<div class="campo">
    <label>Cidade:</label>
    <input type="text" id="cidade">
</div>

<div class="campo">
    <label>Mensagem:</label>
    <textarea id="mensagem" required=""></textarea>
</div>

<button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
    <i class="fab fa-whatsapp"></i> Enviar para o WhatsApp
</button>
```

</form>

<div class="info-contato">
    <p><i class="fas fa-phone"></i> (81) 98543-9697</p>
    <p><i class="fas fa-clock"></i> 08:30 às 21:30</p>
</div>

<footer>
    <p>📍 Rua José de Alencar, 120</p>
    <p>© 2026 Grão Dourado</p>
</footer>

</div>

<script>
function enviarWhatsApp() {
    let nome = document.getElementById("nome").value;
    let cidade = document.getElementById("cidade").value;
    let mensagem = document.getElementById("mensagem").value;

    if (!nome || !mensagem) {
        alert("Preencha nome e mensagem!");
        return;
    }

    let numero = "5581985439697";

    let texto = `Olá! ☕
Nome: ${nome}
Cidade: ${cidade}

Mensagem: ${mensagem}`;

    let link = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

    window.open(link, "_blank");
}
</script>
</body>
</html>
